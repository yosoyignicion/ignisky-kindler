name: Lint

on:
  push:
    branches: [main]
    paths: ['src/**', 'demo.sh']
  pull_request:
    branches: [main]
    paths: ['src/**', 'demo.sh']

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: './src'
